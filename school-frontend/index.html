<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Dashboard - School Management System</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .alert-card {
            background: #fff8e1;
            border: 1px solid #ffe082;
            border-radius: var(--radius);
            padding: 14px 18px;
            margin-bottom: 20px;
        }
        .alert-card h3 { font-size: 13px; font-weight: 700; color: #b7770d; margin-bottom: 10px; }
        .alert-list { list-style: none; padding: 0; margin: 0; }
        .alert-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 6px 0;
            border-bottom: 1px solid #ffe082;
            font-size: 13px;
        }
        .alert-list li:last-child { border-bottom: none; }
        .alert-list .student-name { font-weight: 600; color: var(--gray-800); }
        .alert-list .fee-detail   { color: var(--gray-600); font-size: 12px; }
        .alert-list .overdue-amt  { color: var(--danger); font-weight: 700; }
        .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        @media(max-width:768px) { .two-col { grid-template-columns: 1fr; } }
        .att-summary-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 7px 0;
            border-bottom: 1px solid var(--gray-200);
            font-size: 13px;
        }
        .att-summary-row:last-child { border-bottom: none; }
        .att-bar {
            height: 6px;
            border-radius: 3px;
            background: var(--gray-200);
            margin-top: 4px;
            overflow: hidden;
        }
        .att-bar-fill { height: 100%; background: var(--success); border-radius: 3px; transition: width 0.4s; }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div class="container">
        <div class="page-header">
            <h1 class="h1" id="welcome-msg">Welcome back</h1>
            <p class="small" id="welcome-date"></p>
        </div>

        <!-- live stat cards -->
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-icon" style="background:#e8f0fe">🎓</div>
                <div class="stat-info">
                    <div class="value" id="stat-students">—</div>
                    <div class="label">Students</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#e6f4ea">👩‍🏫</div>
                <div class="stat-info">
                    <div class="value" id="stat-teachers">—</div>
                    <div class="label">Teachers</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#fef9e7">🏫</div>
                <div class="stat-info">
                    <div class="value" id="stat-classes">—</div>
                    <div class="label">Classes</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#fce8e6">💰</div>
                <div class="stat-info">
                    <div class="value" id="stat-fees-pending">—</div>
                    <div class="label">Fees Pending</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#fef3c7">⚠️</div>
                <div class="stat-info">
                    <div class="value" id="stat-fees-overdue">—</div>
                    <div class="label">Fees Overdue</div>
                </div>
            </div>
        </div>

        <!-- overdue fee alerts -->
        <div id="overdue-alert" class="alert-card" style="display:none">
            <h3>⚠️ Overdue Fee Alerts</h3>
            <ul class="alert-list" id="overdue-list"></ul>
            <a href="/pages/fees.html" style="font-size:12px;margin-top:8px;display:inline-block">View all fees →</a>
        </div>

        <!-- today's attendance + quick links -->
        <div class="two-col">
            <div class="card">
                <h2>Today's Attendance</h2>
                <div id="att-summary-body">
                    <p class="small" style="color:var(--gray-400)">Loading...</p>
                </div>
            </div>

            <div class="card">
                <h2>Quick Actions</h2>
                <div class="quick-grid" style="grid-template-columns:1fr 1fr">
                    <a href="/pages/attendance.html" class="quick-link"><span class="ql-icon">📋</span> Attendance</a>
                    <a href="/pages/grades.html"     class="quick-link"><span class="ql-icon">📝</span> Grades</a>
                    <a href="/pages/fees.html"       class="quick-link"><span class="ql-icon">💳</span> Fees</a>
                    <a href="/pages/timetable.html"  class="quick-link"><span class="ql-icon">🗓️</span> Timetable</a>
                    <a href="/pages/students.html"   class="quick-link"><span class="ql-icon">🎓</span> Students</a>
                    <a href="/pages/teachers.html"   class="quick-link"><span class="ql-icon">👩‍🏫</span> Teachers</a>
                </div>
            </div>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script>requireLogin();</script>
    <script src="/app.js"></script>
    <script src="/js/dashboard.js"></script>
</body>
</html>
