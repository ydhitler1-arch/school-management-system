<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Parent Portal - School Management System</title>
    <link rel="stylesheet" href="/styles.css">
    <style>
        .tab-bar { display:flex; gap:4px; margin-bottom:20px; }
        .tab-btn {
            padding:8px 20px; border:none; border-radius:8px; font-size:13px;
            font-weight:600; cursor:pointer; background:var(--gray-200); color:var(--gray-600);
            transition:background 0.15s, color 0.15s;
        }
        .tab-btn.active { background:var(--primary); color:#fff; }
        .tab-panel { display:none; }
        .tab-panel.active { display:block; }

        .info-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(140px,1fr)); gap:14px; margin-bottom:20px; }
        .info-box { background:var(--gray-50); border-radius:8px; padding:14px 16px; }
        .info-box .val { font-size:20px; font-weight:700; color:var(--gray-800); }
        .info-box .lbl { font-size:11px; color:var(--gray-600); margin-top:2px; text-transform:uppercase; letter-spacing:0.04em; }

        .att-bar { height:8px; border-radius:4px; background:var(--gray-200); margin-top:6px; }
        .att-bar-fill { height:100%; border-radius:4px; background:var(--success); }

        .report-table { width:100%; border-collapse:collapse; font-size:13px; }
        .report-table th { background:var(--gray-50); padding:8px 12px; text-align:left; font-size:11px; font-weight:700; color:var(--gray-600); text-transform:uppercase; }
        .report-table td { padding:8px 12px; border-bottom:1px solid var(--gray-200); }
        .subject-heading { background:var(--primary-light); font-weight:700; padding:8px 12px; font-size:13px; color:var(--primary); }

        .fee-status-paid    { background:var(--success-light); color:var(--success); }
        .fee-status-pending { background:var(--warning-light); color:var(--warning); }
        .fee-status-overdue { background:var(--danger-light);  color:var(--danger);  }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div class="container">
        <div id="child-header" style="margin-bottom:20px">
            <h1 class="h1" id="child-name">Loading...</h1>
            <p class="small" id="child-meta"></p>
        </div>

        <div class="tab-bar">
            <button class="tab-btn active" data-tab="overview">Overview</button>
            <button class="tab-btn" data-tab="grades">Grades</button>
            <button class="tab-btn" data-tab="attendance">Attendance</button>
            <button class="tab-btn" data-tab="fees">Fees</button>
        </div>

        <!-- Overview -->
        <div class="tab-panel active" id="tab-overview">
            <div class="info-grid" id="overview-grid">
                <div class="info-box"><div class="val" id="ov-attendance">—</div><div class="lbl">Attendance</div></div>
                <div class="info-box"><div class="val" id="ov-present">—</div><div class="lbl">Days Present</div></div>
                <div class="info-box"><div class="val" id="ov-absent">—</div><div class="lbl">Days Absent</div></div>
                <div class="info-box"><div class="val" id="ov-fees-due">—</div><div class="lbl">Fees Due</div></div>
            </div>
            <div class="card">
                <h2>Announcements</h2>
                <div id="parent-announcements"><p class="small" style="color:var(--gray-400)">Loading...</p></div>
            </div>
        </div>

        <!-- Grades -->
        <div class="tab-panel" id="tab-grades">
            <div class="card">
                <h2>Report Card</h2>
                <div id="grades-body"><p class="small" style="color:var(--gray-400)">Loading...</p></div>
            </div>
        </div>

        <!-- Attendance -->
        <div class="tab-panel" id="tab-attendance">
            <div class="card">
                <h2>Attendance Record</h2>
                <div id="att-summary" style="margin-bottom:16px"></div>
                <table class="table">
                    <thead><tr><th>Date</th><th>Class</th><th>Status</th></tr></thead>
                    <tbody id="att-tbody"><tr><td colspan="3" class="small">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>

        <!-- Fees -->
        <div class="tab-panel" id="tab-fees">
            <div class="card">
                <h2>Fee Records</h2>
                <div id="fee-summary" style="margin-bottom:16px"></div>
                <table class="table">
                    <thead><tr><th>Fee Type</th><th>Amount</th><th>Due Date</th><th>Status</th></tr></thead>
                    <tbody id="fees-tbody"><tr><td colspan="4" class="small">Loading...</td></tr></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/app.js"></script>
    <script src="/js/parent.js"></script>
</body>
</html>
