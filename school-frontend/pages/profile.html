<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>My Profile - School Management System</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div id="navbar-placeholder"></div>
    <div class="container">
        <h1 class="h1">My Profile</h1>
        <p class="small">View your account details and change your password.</p>

        <div class="grid">
            <!-- account info -->
            <div class="card">
                <h2>Account Details</h2>
                <table class="table">
                    <tbody>
                        <tr><td style="font-weight:600;width:120px">Name</td><td id="profile-name">—</td></tr>
                        <tr><td style="font-weight:600">Email</td><td id="profile-email">—</td></tr>
                        <tr><td style="font-weight:600">Role</td><td id="profile-role">—</td></tr>
                        <tr><td style="font-weight:600">Member since</td><td id="profile-since">—</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- change password -->
            <div class="card">
                <h2>Change Password</h2>
                <p class="msg" id="status-msg"></p>
                <form id="password-form">
                    <div class="form-row">
                        <input class="input" type="password" id="current-password"
                            placeholder="Current password" required style="flex:1" />
                    </div>
                    <div class="form-row">
                        <input class="input" type="password" id="new-password"
                            placeholder="New password (min 6 characters)" required style="flex:1" />
                    </div>
                    <div class="form-row">
                        <input class="input" type="password" id="confirm-password"
                            placeholder="Confirm new password" required style="flex:1" />
                    </div>
                    <div class="form-row">
                        <button type="submit">Update Password</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/app.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
