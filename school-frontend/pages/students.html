<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Students - School Management System</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <div id="navbar-placeholder"></div>
    <div class="container">
        <h1 class="h1">Manage Students</h1>
        <p class="small">Add, edit, or remove student records.</p>
        <p class="msg" id="status-msg"></p>
        <div style="margin-bottom:12px">
            <button id="export-students-btn" class="btn-secondary" style="font-size:12px;padding:6px 14px">⬇️ Export to CSV</button>
        </div>

        <div class="grid">
            <div class="card">
                <div class="form-row" style="margin-bottom:14px">
                    <input class="input" type="text" id="search-input" placeholder="🔍  Search by name..." style="flex:2" />
                    <select class="input" id="filter-class-search" style="flex:1">
                        <option value="">All classes</option>
                    </select>
                    <button type="button" id="clear-search-btn" class="btn-secondary">Clear</button>
                </div>
                <p id="results-count" class="small" style="margin-bottom:8px"></p>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Class</th>
                            <th>Roll No</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="students-tbody">
                        <tr>
                            <td colspan="5" class="small">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h2 id="form-title">Add Student</h2>
                <form id="student-form">
                    <input type="hidden" id="student-id" />
                    <div class="form-row">
                        <input class="input" type="text" id="name" placeholder="Full name" required style="flex:1" />
                    </div>
                    <div class="form-row">
                        <input class="input" type="number" id="age" placeholder="Age" min="1" required style="flex:1" />
                    </div>
                    <div class="form-row">
                        <select class="input" id="class" style="flex:1">
                            <option value="">-- Select class --</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <input class="input" type="number" id="rollNo" placeholder="Roll No" min="0" style="flex:1" />
                    </div>
                    <div class="form-row">
                        <button type="submit" id="submit-btn">Add Student</button>
                        <button type="button" id="cancel-btn" class="btn-secondary" style="display:none">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/export.js"></script>
    <script src="/js/students.js"></script>
</body>

</html>
