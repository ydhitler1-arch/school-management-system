<!doctype html>
<html>

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Teachers - School Management System</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <div id="navbar-placeholder"></div>
    <div class="container">
        <h1 class="h1">Manage Teachers</h1>
        <p class="small">Add, edit, or remove teacher records.</p>
        <p class="msg" id="status-msg"></p>

        <div class="grid">
            <div class="card">
                <div class="form-row" style="margin-bottom:14px">
                    <input class="input" type="text" id="search-name" placeholder="🔍  Search by name..." style="flex:2" />
                    <input class="input" type="text" id="search-subject" placeholder="Filter by subject..." style="flex:1" />
                    <button type="button" id="clear-search-btn" class="btn-secondary">Clear</button>
                </div>
                <p id="results-count" class="small" style="margin-bottom:8px"></p>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Subject</th>
                            <th>Email</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="teachers-tbody">
                        <tr>
                            <td colspan="4" class="small">Loading...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="card">
                <h2 id="form-title">Add Teacher</h2>
                <form id="teacher-form">
                    <input type="hidden" id="teacher-id" />
                    <div class="form-row">
                        <input class="input" type="text" id="name" placeholder="Full name" required style="flex:1" />
                    </div>
                    <div class="form-row">
                        <input class="input" type="text" id="subject" placeholder="Subject" style="flex:1" />
                    </div>
                    <div class="form-row">
                        <input class="input" type="email" id="email" placeholder="Email" style="flex:1" />
                    </div>
                    <div class="form-row">
                        <input class="input" type="password" id="password" placeholder="Login password (min 6 chars)" style="flex:1" />
                    </div>
                    <div class="form-row">
                        <button type="submit" id="submit-btn">Add Teacher</button>
                        <button type="button" id="cancel-btn" class="btn-secondary" style="display:none">Cancel</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="/app.js"></script>
    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/teachers.js"></script>
</body>

</html>
