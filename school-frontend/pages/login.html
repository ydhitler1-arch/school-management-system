<!doctype html>
<html>
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sign In - School Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="/styles.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e1b4b 0%, #3730a3 40%, #4f46e5 70%, #818cf8 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* animated background blobs */
        body::before, body::after {
            content: '';
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            animation: blobFloat 8s ease-in-out infinite;
            pointer-events: none;
        }
        body::before {
            width: 400px; height: 400px;
            background: rgba(99,102,241,0.3);
            top: -100px; right: -100px;
        }
        body::after {
            width: 350px; height: 350px;
            background: rgba(139,92,246,0.25);
            bottom: -80px; left: -80px;
            animation-delay: -4s;
        }

        @keyframes blobFloat {
            0%, 100% { transform: translate(0, 0) scale(1); }
            33%       { transform: translate(20px, -20px) scale(1.05); }
            66%       { transform: translate(-15px, 15px) scale(0.97); }
        }

        .login-wrap { position: relative; z-index: 1; width: 100%; max-width: 400px; }

        .login-card {
            background: rgba(255,255,255,0.97);
            border-radius: 20px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.3), 0 8px 20px rgba(0,0,0,0.15);
            padding: 44px 40px 36px;
            animation: scaleIn 0.4s cubic-bezier(0.4,0,0.2,1) both;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.5);
        }

        .login-logo {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #4f46e5, #818cf8);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            margin-bottom: 20px;
            box-shadow: 0 8px 20px rgba(79,70,229,0.35);
            animation: fadeUp 0.5s 0.1s ease both;
        }

        .login-card h1 {
            font-size: 22px;
            font-weight: 800;
            color: #1f2937;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
            animation: fadeUp 0.5s 0.15s ease both;
        }

        .login-card .subtitle {
            color: #6b7280;
            margin-bottom: 28px;
            font-size: 14px;
            animation: fadeUp 0.5s 0.2s ease both;
        }

        .login-card .input {
            width: 100%;
            padding: 11px 14px;
            font-size: 14px;
            margin-bottom: 12px;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            transition: all 0.2s;
            animation: fadeUp 0.5s 0.25s ease both;
        }

        .login-card .input:focus {
            border-color: #4f46e5;
            box-shadow: 0 0 0 4px rgba(79,70,229,0.12);
            transform: translateY(-1px);
        }

        .login-card button {
            width: 100%;
            padding: 12px;
            font-size: 15px;
            font-weight: 700;
            margin-top: 6px;
            border-radius: 10px;
            background: linear-gradient(135deg, #4f46e5, #3730a3);
            letter-spacing: 0.02em;
            animation: fadeUp 0.5s 0.3s ease both;
        }

        .login-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(79,70,229,0.4);
        }

        .login-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            animation: fadeIn 0.5s 0.4s ease both;
        }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <div class="login-logo">🏫</div>
            <h1>School Management System</h1>
            <p class="subtitle">Sign in to your account</p>
            <p class="msg" id="status-msg"></p>
            <input class="input" type="email" id="email" placeholder="Email address" required autocomplete="email" />
            <input class="input" type="password" id="password" placeholder="Password" required autocomplete="current-password" />
            <button type="button" id="submit-btn">Sign In →</button>
        </div>
        <p class="login-footer">School Management System • Secure Login</p>
    </div>

    <script src="/js/config.js"></script>
    <script src="/js/auth.js"></script>
    <script src="/js/login.js"></script>
    <script>
        // allow Enter key to submit
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('submit-btn').click();
        });
    </script>
</body>
</html>
